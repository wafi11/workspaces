apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terminal
  namespace: {{.Namespace}}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "terminal"
    nginx.ingress.kubernetes.io/upgrade-type: "websocket"
spec:
  ingressClassName: nginx
  rules:
  - host: "{{.Name}}.{{.Domain}}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: terminal
            port:
              number: 80
              targetPort: 7681
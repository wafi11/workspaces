apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
spec:
  replicas: {{.Replicas}}
  selector:
    matchLabels:
      app: {{.Name}}
  template:
    metadata:
      labels:
        app: {{.Name}}
    spec:
      securityContext:
        runAsUser: {{.RunAsUser}}
        runAsGroup: {{.RunAsGroup}}
        fsGroup: {{.FsGroup}}
      containers:
        - name: {{.Name}}
          image: codercom/code-server:4.91.1
          args: 
          - "--auth"
          - "none"
          - "--bind-addr"
          - "0.0.0.0:8080"
          - "--disable-telemetry"
          - "--disable-update-check"
          - "/data"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: {{.CPURequest}}
              memory: {{.MemRequest}}
            limits:
              cpu: {{.CPULimit}}
              memory: {{.MemLimit}}
          volumeMounts:
            - name: user-data
              mountPath: /data
              subPath: home
      volumes:
        - name: user-data
          persistentVolumeClaim:
            claimName: shared-storage-pvc
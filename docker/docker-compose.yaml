services:
  db_dev:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workspaces_dev
    networks:
      - workspaces
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_dev:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - workspaces
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  

networks:
  workspaces:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # S3 API Port
      - "9001:9001"  
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - workspaces
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

networks:
  workspaces:
    driver: bridge


volumes:
  minio_data:

stages:
  - build
  - deploy

variables:
  REGISTRY: "192.168.1.31:5050"
  IMAGE_LOG: "$REGISTRY/root/log-service:$CI_COMMIT_SHORT_SHA"
  IMAGE_LOG_LATEST: "$REGISTRY/root/log-service:latest"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""

build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--insecure-registry", "192.168.1.31:5050"]
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login -u $REGISTRY_USER --password-stdin http://$REGISTRY
  script:
    - docker build -t $IMAGE_LOG -t $IMAGE_LOG_LATEST -f log-services/Dockerfile log-services/
    - docker push $IMAGE_LOG
    - docker push $IMAGE_LOG_LATEST
  only:
    - main

deploy:
  stage: deploy
  image:
    name: alpine/k8s:1.28.3
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - kubectl cluster-info
    - kubectl set image deployment/log-service log-service=$IMAGE_LOG -n logging
    - kubectl rollout status deployment/log-service -n logging --timeout=120s
  only:
    - main

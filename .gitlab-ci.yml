stages:
  - build
  - deploy

variables:
  REGISTRY: "192.168.1.31:5050"
  IMAGE: "$REGISTRY/root/workspaces/log-service:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$REGISTRY/root/workspaces/log-service:latest"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"

build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--insecure-registry", "192.168.1.31:5050"]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY
  script:
    - docker build -t $IMAGE -t $IMAGE_LATEST .
    - docker push $IMAGE
    - docker push $IMAGE_LATEST
  only:
    - main

deploy:
  stage: deploy
  image:
    name: alpine/k8s:1.28.3
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - kubectl cluster-info
    - kubectl set image deployment/log-service log-service=$IMAGE -n logging
    - kubectl rollout status deployment/log-service -n logging --timeout=120s
  only:
    - main
